<!doctype html>
<html lang="pt-BR" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genesis</title>
    <!--
      Zero-flash theme bootstrap (D3): roda sync ANTES do React
      hydrate. Lê localStorage["genesis-theme"] e ajusta data-theme +
      class .dark no <html>. Sem isso, usuários com preferência
      "light" salva veriam um flash dark→light no boot. Mantém em
      sync com applyTheme do useTheme.ts — toda mudança aqui exige
      eco lá.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("genesis-theme");
          var theme = saved === "light" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {
          /* localStorage bloqueado / inacessível: cai no default
             dark já no atributo do <html>. Silencioso. */
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
